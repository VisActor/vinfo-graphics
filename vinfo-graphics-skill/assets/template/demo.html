<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VInfo Graphics Demo</title>

    <!-- VChart CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vchart/build/index.min.js"></script>
    <!-- VInfo Graphics UMD -->
    <script src="https://cdn.jsdelivr.net/npm/@visactor/vinfo-graphics/dist/index.umd.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          'Noto Sans', sans-serif;
        background-color: #f8fafc;
        min-height: 100vh;
        padding: 24px;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
      }
      header {
        margin-bottom: 24px;
        text-align: center;
      }
      header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }
      header p {
        color: #64748b;
        font-size: 15px;
      }
      .editor-container {
        display: flex;
        flex-direction: column;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
        border: 1px solid #e2e8f0;
        overflow: hidden;
      }
      .code-panel {
        background: #1e293b;
        display: flex;
        flex-direction: column;
      }
      .code-panel.is-hidden {
        display: none;
      }
      .preview-panel {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
      .editor-container.is-code-hidden .preview-panel {
        border-bottom: none;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
      }
      .editor-container.is-code-hidden .chart-container {
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        overflow: hidden;
      }
      .panel-header {
        padding: 12px 20px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex-shrink: 0;
      }
      .panel-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .code-panel .panel-header {
        background: #0f172a;
        color: #64748b;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .code-panel .panel-header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .code-panel .panel-hint {
        font-size: 12px;
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        color: #94a3b8;
      }
      .btn-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 4px;
        border: 1px solid #334155;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .btn-icon:hover {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-icon .tooltip {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        padding: 4px 8px;
        border-radius: 4px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 11px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .btn-icon:hover .tooltip {
        opacity: 1;
      }
      .btn-icon.is-copied {
        color: #4ade80;
        border-color: #4ade80;
      }
      .preview-panel .panel-header {
        background: #f8fafc;
        color: #64748b;
        border-bottom: 1px solid #e2e8f0;
        margin: -20px -20px 20px -20px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .code-editor {
        flex: 1;
        min-height: 600px;
        overflow: auto;
        padding: 16px;
      }
      .code-editor textarea {
        width: 100%;
        height: 100%;
        min-height: 550px;
        background: transparent;
        border: none;
        color: #e2e8f0;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 13px;
        line-height: 1.6;
        resize: none;
        outline: none;
      }
      .chart-container {
        height: 500px;
        position: relative;
        background-size: cover;
        background-position: center;
      }
      #chart {
        width: 100%;
        height: 100%;
      }
      .validation-result {
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .validation-success {
        background: #dcfce7;
        color: #166534;
      }
      .validation-error {
        background: #fee2e2;
        color: #991b1b;
      }
      .btn {
        padding: 8px 16px;
        border-radius: 6px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #3b82f6;
        color: #fff;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-secondary {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn-secondary:hover {
        background: #0f172a;
      }

      body.is-dark {
        background-color: #0f172a;
      }
      body.is-dark header h1 {
        color: #f1f5f9;
      }
      body.is-dark header p {
        color: #94a3b8;
      }
      body.is-dark .editor-container {
        background: #1e293b;
        border-color: #334155;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      body.is-dark .preview-panel {
        background: #1e293b;
        border-bottom-color: #334155;
      }
      body.is-dark .preview-panel .panel-header {
        background: #0f172a;
        color: #94a3b8;
        border-bottom-color: #334155;
      }
      body.is-dark .chart-container {
        background: #1e293b;
      }
      body.is-dark .validation-success {
        background: #064e3b;
        color: #6ee7b7;
      }
      body.is-dark .validation-error {
        background: #7f1d1d;
        color: #fca5a5;
      }

      body.is-light {
        background-color: #f8fafc;
      }
      body.is-light header h1 {
        color: #1e293b;
      }
      body.is-light header p {
        color: #64748b;
      }
      body.is-light .editor-container {
        background: #fff;
        border-color: #e2e8f0;
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
      }
      body.is-light .preview-panel {
        background: #fff;
        border-bottom-color: #e2e8f0;
      }
      body.is-light .preview-panel .panel-header {
        background: #f8fafc;
        color: #64748b;
        border-bottom-color: #e2e8f0;
      }
      body.is-light .chart-container {
        background: #fff;
      }
      body.is-light .validation-success {
        background: #dcfce7;
        color: #166534;
      }
      body.is-light .validation-error {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1 id="chart-title">{{title}}</h1>
        <p>{{description}}</p>
      </header>

      <div class="editor-container">
        <div class="preview-panel">
          <div class="panel-header">
            <span>Preview</span>
            <div class="panel-header-actions">
              <button class="btn btn-secondary" onclick="downloadImage()">Download</button>
              <button class="btn btn-secondary" id="toggle-code-btn" onclick="toggleCodePanel()">
                Show Code
              </button>
            </div>
          </div>
          <div id="validation-result" class="validation-result" style="display: none"></div>
          <div class="chart-container" id="chart-wrapper">
            <div id="chart"></div>
          </div>
        </div>
        <div class="code-panel is-hidden">
          <div class="panel-header">
            <span>Schema Config</span>
            <div class="panel-header-right">
              <span class="panel-hint">修改代码，更新图表效果</span>
              <button
                class="btn-icon"
                id="copy-schema-btn"
                onclick="copySchema()"
                title="Copy Schema"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span class="tooltip">复制 Schema</span>
              </button>
            </div>
          </div>
          <div class="code-editor">
            <textarea id="code-input" spellcheck="false"></textarea>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ====== SCHEMA_START ======
      // prettier-ignore
      {{schema}}
      // ====== SCHEMA_END ======

      let chartInstance = null;
      let isCodePanelVisible = false;

      // Initialize code editor
      document.getElementById('code-input').value = JSON.stringify(schema, null, 2);

      function setCodePanelVisibility(visible) {
        const editorContainer = document.querySelector('.editor-container');
        const codePanel = document.querySelector('.code-panel');
        const toggleButton = document.getElementById('toggle-code-btn');
        if (!editorContainer || !codePanel || !toggleButton) {
          return;
        }
        isCodePanelVisible = visible;
        codePanel.classList.toggle('is-hidden', !visible);
        editorContainer.classList.toggle('is-code-hidden', !visible);
        toggleButton.textContent = visible ? 'Hide Code' : 'Show Code';
      }

      document.addEventListener('DOMContentLoaded', function () {
        const editorContainer = document.querySelector('.editor-container');
        if (editorContainer) {
          editorContainer.classList.add('is-code-hidden');
        }
      });

      function toggleCodePanel() {
        setCodePanelVisibility(!isCodePanelVisible);
      }

      function copySchema() {
        const codeInput = document.getElementById('code-input');
        const text = codeInput.value;
        navigator.clipboard.writeText(text).then(function () {
          const btn = document.getElementById('copy-schema-btn');
          btn.classList.add('is-copied');
          btn.querySelector('.tooltip').textContent = '已复制!';
          setTimeout(function () {
            btn.classList.remove('is-copied');
            btn.querySelector('.tooltip').textContent = '复制 Schema';
          }, 1500);
        });
      }

      function showDownloadError(message) {
        const resultEl = document.getElementById('validation-result');
        resultEl.className = 'validation-result validation-error';
        resultEl.textContent = message;
        resultEl.style.display = 'block';
      }

      function downloadImage() {
        const container = document.getElementById('chart');
        if (!container) {
          showDownloadError('Chart container not found');
          return;
        }

        const canvas = container.querySelector('canvas');

        if (canvas && canvas.toDataURL) {
          const dataUrl = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.href = dataUrl;
          const title = document.getElementById('chart-title').textContent || 'chart';
          link.download = title + '.png';
          link.click();
          return;
        }

        showDownloadError('Cannot export image from current chart');
      }

      function validateSchema(schemaToValidate) {
        const resultEl = document.getElementById('validation-result');

        try {
          // Use VInfoGraphics validation
          const result = VInfoGraphics.validateWithZod(schemaToValidate);

          if (result.success) {
            resultEl.className = 'validation-result validation-success';
            resultEl.textContent = 'Schema validation passed';
            resultEl.style.display = 'none';
            return true;
          } else {
            resultEl.className = 'validation-result validation-error';
            resultEl.textContent = 'Validation failed: ' + JSON.stringify(result.errors, null, 2);
            resultEl.style.display = 'block';
            return false;
          }
        } catch (e) {
          resultEl.className = 'validation-result validation-error';
          resultEl.textContent = 'Validation error: ' + e.message;
          resultEl.style.display = 'block';
          return false;
        }
      }

      function getSystemTheme() {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          return 'dark';
        }
        return 'light';
      }

      function resolveThemeMode(schemaConfig) {
        const themeConfig = VInfoGraphics.resolveTheme(schemaConfig?.theme);
        return VInfoGraphics.isDarkTheme(themeConfig) ? 'dark' : 'light';
      }

      function applyPageTheme(mode) {
        document.body.classList.toggle('is-dark', mode === 'dark');
        document.body.classList.toggle('is-light', mode === 'light');
      }

      function applyContainerSize(width, height) {
        const container = document.getElementById('chart-wrapper');
        if (container) {
          if (width) {
            container.style.minWidth = width + 'px';
          }

          if (height) {
            container.style.height = height + 'px';
          }
        }
      }

      async function renderChart() {
        const codeInput = document.getElementById('code-input').value;

        let parsedSchema;
        try {
          parsedSchema = JSON.parse(codeInput);
        } catch (e) {
          const resultEl = document.getElementById('validation-result');
          resultEl.className = 'validation-result validation-error';
          resultEl.textContent = 'JSON parse error: ' + e.message;
          resultEl.style.display = 'block';
          return;
        }

        // Validate schema
        const isValid = validateSchema(parsedSchema);

        if (!isValid) {
          return;
        }

        // Destroy old chart
        if (chartInstance) {
          chartInstance.release();
          chartInstance = null;
        }

        // Clear container
        document.getElementById('chart').innerHTML = '';

        // Apply theme
        const preferredTheme = resolveThemeMode(parsedSchema);
        applyPageTheme(preferredTheme);
        applyContainerSize(parsedSchema.width, parsedSchema.height);

        // Render new chart
        const container = document.getElementById('chart');

        try {
          const vchartSpec = VInfoGraphics.toVChartSpec(parsedSchema);
          chartInstance = new VChart.default(vchartSpec, { dom: container });
          chartInstance.renderSync();
        } catch (e) {
          const resultEl = document.getElementById('validation-result');
          resultEl.className = 'validation-result validation-error';
          resultEl.textContent = 'Render error: ' + e.message;
          resultEl.style.display = 'block';
          return;
        }
      }

      // Page load auto render
      window.onload = function () {
        renderChart();

        // Add editor real-time update listener
        const codeInput = document.getElementById('code-input');
        let debounceTimer = null;

        codeInput.addEventListener('input', function () {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            renderChart();
          }, 500);
        });

        codeInput.addEventListener('keyup', function (e) {
          if (e.ctrlKey && e.key === 'Enter') {
            clearTimeout(debounceTimer);
            renderChart();
          }
        });

        // Listen for system theme changes
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
            renderChart();
          });
        }
      };
    </script>
  </body>
</html>
