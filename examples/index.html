<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VInfo Graphics - 示例</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        margin: 0;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 300px;
        background: #fff;
        border-right: 1px solid #e9ecef;
        padding: 20px;
        overflow-y: auto;
      }

      .sidebar-title {
        font-size: 20px;
        color: #333;
        margin-bottom: 16px;
      }

      .sidebar-nav {
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 16px;
      }

      .nav-category-title {
        font-size: 14px;
        font-weight: 600;
        color: #666;
        padding: 0 8px;
        border-left: 3px solid #5B8FF9;
      }

      .nav-category-title.active {
        color: #5B8FF9;
        border-left-color: #5B8FF9;
      }

      .nav-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-left: 16px;
      }

      .nav-btn {
        width: 100%;
        text-align: left;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .nav-btn:hover {
        background: #f0f5ff;
        border-color: #5B8FF9;
        color: #5B8FF9;
      }

      .nav-btn.active {
        background: #5B8FF9;
        border-color: #5B8FF9;
        color: #fff;
      }

      main {
        flex: 1;
        max-width: none;
        margin: 0;
        padding: 20px;
        overflow-y: auto;
      }

      .chart-info {
        font-size: 14px;
        color: #666;
        margin-bottom: 12px;
        padding: 8px 12px;
        background: #f8f9fa;
        border-radius: 6px;
        display: inline-block;
      }

      .chart-container {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      #chart {
        width: 100%;
        height: 450px;
      }

      .schema-panel {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      .schema-panel h2 {
        font-size: 16px;
        color: #333;
        margin-bottom: 12px;
      }

      pre {
        background: #f8f9fa;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.5;
        max-height: 400px;
        overflow-y: auto;
      }

      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid #e9ecef;
          max-height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="sidebar-title">VInfo Graphics - 图表示例</h1>
        <nav class="nav sidebar-nav" id="nav"></nav>
      </aside>

      <main>
        <div class="chart-container">
          <span class="chart-info" id="chart-info"></span>
          <div id="chart"></div>
        </div>

        <div class="schema-panel">
          <h2>当前 Schema</h2>
          <pre id="schema-output"></pre>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
